services:
  db:
    image: postgres:16-alpine
    container_name: etd-db
    environment:
      POSTGRES_DB: exploratory_testing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exploratory_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etd-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@db:5432/exploratory_testing
      JWT_SECRET: exploratory-testing-dashboard-secret-key-123
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy &&
             node scripts/bootstrap-admin.js &&
             npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etd-frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4200:4200"
    command: npm run start -- --host 0.0.0.0 --port 4200

volumes:
  postgres_data:
