services:
  db:
    image: postgres:16-alpine
    container_name: etd-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exploratory_testing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d exploratory_testing" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - private

  backend:
    image: ${BACKEND_IMAGE:-exploratory-testing-backend:latest}
    container_name: etd-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@db:5432/exploratory_testing
      JWT_SECRET: exploratory-testing-dashboard-secret-key-123
      # Trust one proxy hop (nginx) and keep HSTS emission at the edge.
      TRUST_PROXY: "1"
      HSTS_ENABLED: "false"
    command: >
      sh -c "npx prisma migrate deploy &&
             node scripts/bootstrap-admin.js &&
             npm run start"
    expose:
      - "3000"
    networks:
      - private

  frontend:
    image: ${FRONTEND_IMAGE:-exploratory-testing-frontend:latest}
    container_name: etd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    command: npm run start -- --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json
    expose:
      - "4200"
    networks:
      - public
      - private

  nginx:
    image: nginx:1.27-alpine
    container_name: etd-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      # Start with conservative max-age. Increase after HTTPS validation in prod.
      HSTS_HEADER: ${HSTS_HEADER:-max-age=300}
    command: >
      /bin/sh -c "envsubst '$$HSTS_HEADER' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -t && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - public
      - private

volumes:
  postgres_data:


networks:
  public:
  private:
    internal: true
